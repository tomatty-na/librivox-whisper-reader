<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibriVox Reader — MVP Player</title>
<style>
  /* ── Reset / Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f9f6f0;
    color: #2c2c2c;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  header {
    background: #1a1a2e;
    color: #e8e4d8;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  header h1 { font-size: 1.1rem; font-weight: normal; letter-spacing: 0.05em; }
  header .badge {
    font-size: 0.65rem;
    background: #e74c3c;
    color: #fff;
    padding: 0.15em 0.5em;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }

  main {
    flex: 1;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem 1rem 6rem;
  }

  /* ── Sticky Player ── */
  #player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1a1a2e;
    color: #e8e4d8;
    padding: 0.75rem 1.5rem;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  #player-bar .controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  #player-bar button {
    background: transparent;
    border: 1px solid #555;
    color: #e8e4d8;
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1.4;
  }
  #player-bar button:hover { background: #2a2a4e; border-color: #aaa; }
  #play-btn { font-size: 1rem; min-width: 2.2rem; }

  #time-display { font-size: 0.8rem; color: #aaa; min-width: 6rem; }

  #speed-select {
    background: #1a1a2e;
    color: #e8e4d8;
    border: 1px solid #555;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-size: 0.82rem;
  }

  #seek-bar {
    width: 100%;
    accent-color: #e8e4d8;
    cursor: pointer;
  }

  /* ── JSON source picker ── */
  #source-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  #source-bar input[type=text] {
    flex: 1;
    padding: 0.35rem 0.6rem;
    border: 1px solid #bbb;
    border-radius: 4px;
    font-size: 0.85rem;
    background: #fff;
  }
  #source-bar button {
    padding: 0.35rem 0.8rem;
    background: #1a1a2e;
    color: #e8e4d8;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #source-bar button:hover { background: #2a2a4e; }

  /* ── Meta ── */
  #meta-box {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 0.8rem 1rem;
    margin-bottom: 1.2rem;
    font-size: 0.85rem;
    display: none;
  }
  #meta-box.visible { display: block; }
  #meta-box p { margin-bottom: 0.2rem; }
  #meta-box a { color: #1a1a8e; }

  /* ── Transcript ── */
  #transcript {
    line-height: 1.9;
    font-size: 1.05rem;
  }

  .seg {
    display: inline;
    cursor: pointer;
    border-radius: 3px;
    padding: 0.05em 0.1em;
    transition: background 0.15s;
  }
  .seg:hover { background: #e0d8c8; }
  .seg.active {
    background: #ffe066;
    border-radius: 3px;
  }
  .seg-space { display: inline; }

  /* ── Status ── */
  #status {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 0.8rem;
    min-height: 1.2em;
  }
  #status.error { color: #c0392b; }

  /* ── Checks panel ── */
  #checks {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 0.8rem 1rem;
    margin-top: 1.5rem;
    font-size: 0.82rem;
  }
  #checks h3 { margin-bottom: 0.6rem; font-size: 0.9rem; }
  #checks ul { list-style: none; }
  #checks li { margin-bottom: 0.25rem; }
  #checks li::before { margin-right: 0.4rem; }
  #checks li.ok::before    { content: "✓"; color: #27ae60; }
  #checks li.fail::before  { content: "✗"; color: #c0392b; }
  #checks li.pending::before { content: "○"; color: #999; }

  #cors-indicator { font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1>LibriVox Reader</h1>
  <span class="badge">MVP</span>
</header>

<main>
  <!-- JSON source picker -->
  <div id="source-bar">
    <input type="text" id="json-path" value="sample/page-001.json"
           placeholder="path to page-NNN.json or URL">
    <button onclick="loadPage()">Load</button>
  </div>

  <div id="status" class="pending">Ready. Click Load to fetch JSON.</div>

  <!-- Work metadata -->
  <div id="meta-box">
    <p id="meta-title"></p>
    <p id="meta-audio-url"></p>
    <p id="meta-time-range"></p>
  </div>

  <!-- Transcript -->
  <div id="transcript"></div>

  <!-- Verification checklist -->
  <div id="checks">
    <h3>Phase 1 検証チェック</h3>
    <ul>
      <li id="chk-json"    class="pending">JSON読み込み</li>
      <li id="chk-cors"    class="pending">Archive.org CORS / 音声再生</li>
      <li id="chk-hl"      class="pending">ハイライト同期</li>
      <li id="chk-click"   class="pending">クリックで再生位置移動</li>
      <li id="chk-stream"  class="pending">ストリーミング応答性（シーク）</li>
    </ul>
  </div>
</main>

<!-- Sticky player bar -->
<div id="player-bar">
  <div class="controls">
    <button id="play-btn" onclick="togglePlay()">▶</button>
    <span id="time-display">0:00 / 0:00</span>
    <select id="speed-select" onchange="changeSpeed(this.value)">
      <option value="0.75">0.75×</option>
      <option value="1"    selected>1.0×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2.0×</option>
    </select>
    <label style="font-size:0.8rem; display:flex; align-items:center; gap:0.3rem;">
      <input type="checkbox" id="auto-scroll" checked>
      Auto-scroll
    </label>
  </div>
  <input type="range" id="seek-bar" value="0" min="0" max="1000" step="1"
         oninput="onSeekInput(this.value)" onchange="onSeekChange(this.value)">
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// ── State ──
let pageData = null;
let currentSegIdx = -1;
let seekDragging = false;

const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const seekBar = document.getElementById('seek-bar');
const timeDisplay = document.getElementById('time-display');
const transcript = document.getElementById('transcript');
const status = document.getElementById('status');

// ── Load JSON ──
async function loadPage() {
  const path = document.getElementById('json-path').value.trim();
  if (!path) return;

  setStatus('Loading ' + path + ' …', false);
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    pageData = await resp.json();
  } catch (e) {
    setStatus('Failed to load JSON: ' + e.message, true);
    setCheck('chk-json', false);
    return;
  }

  setCheck('chk-json', true);
  setStatus('JSON loaded. ' + pageData.segments.length + ' segments. Setting up audio…', false);
  renderMeta();
  renderTranscript();
  setupAudio();
}

// ── Meta ──
function renderMeta() {
  const box = document.getElementById('meta-box');
  document.getElementById('meta-title').textContent =
    'Work: ' + pageData.work_slug + ' / ' + pageData.audio_file;
  document.getElementById('meta-audio-url').innerHTML =
    'Audio URL: <a href="' + pageData.audio_url + '" target="_blank">' + pageData.audio_url + '</a>';
  const start = fmtSec(pageData.page_start_sec);
  const end   = fmtSec(pageData.page_end_sec);
  document.getElementById('meta-time-range').textContent =
    'Page range: ' + start + ' – ' + end;
  box.classList.add('visible');
}

// ── Transcript ──
function renderTranscript() {
  transcript.innerHTML = '';
  pageData.segments.forEach((seg, i) => {
    const span = document.createElement('span');
    span.className = 'seg';
    span.dataset.idx = i;
    span.textContent = seg.text;
    span.addEventListener('click', () => seekToSegment(i));
    transcript.appendChild(span);
    // Add space between segments
    transcript.appendChild(document.createTextNode(' '));
  });
}

// ── Audio ──
function setupAudio() {
  audio.src = pageData.audio_url;

  // Seek to page start
  audio.addEventListener('loadedmetadata', () => {
    audio.currentTime = pageData.page_start_sec;
    const pageDur = pageData.page_end_sec - pageData.page_start_sec;
    setStatus('Audio ready. Duration: ' + fmtSec(audio.duration) + '. Page: ' + fmtSec(pageData.page_start_sec) + '–' + fmtSec(pageData.page_end_sec), false);
    setCheck('chk-cors', true);
  }, { once: true });

  audio.addEventListener('error', (e) => {
    const codes = ['ABORTED','NETWORK','DECODE','SRC_NOT_SUPPORTED'];
    const code = audio.error ? (codes[audio.error.code - 1] || 'UNKNOWN') : 'UNKNOWN';
    setStatus('Audio error: ' + code + '. CORS issue?', true);
    setCheck('chk-cors', false);
  });

  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('play',  () => { playBtn.textContent = '⏸'; });
  audio.addEventListener('pause', () => { playBtn.textContent = '▶'; });
  audio.addEventListener('ended', () => { playBtn.textContent = '▶'; });
}

// ── timeupdate handler ──
function onTimeUpdate() {
  const t = audio.currentTime;

  // Update seek bar (relative to page range)
  if (!seekDragging && pageData) {
    const rangeStart = pageData.page_start_sec;
    const rangeEnd   = pageData.page_end_sec;
    const pct = Math.max(0, Math.min(1, (t - rangeStart) / (rangeEnd - rangeStart)));
    seekBar.value = Math.round(pct * 1000);
  }

  // Time display
  if (pageData) {
    const elapsed = Math.max(0, t - pageData.page_start_sec);
    const total   = pageData.page_end_sec - pageData.page_start_sec;
    timeDisplay.textContent = fmtSec(elapsed) + ' / ' + fmtSec(total);
  } else {
    timeDisplay.textContent = fmtSec(t);
  }

  // Highlight
  if (!pageData) return;
  let newIdx = -1;
  for (let i = 0; i < pageData.segments.length; i++) {
    const seg = pageData.segments[i];
    if (t >= seg.start && t < seg.end) { newIdx = i; break; }
  }
  if (newIdx !== currentSegIdx) {
    if (currentSegIdx >= 0) {
      const prev = transcript.querySelector('[data-idx="' + currentSegIdx + '"]');
      if (prev) prev.classList.remove('active');
    }
    if (newIdx >= 0) {
      const curr = transcript.querySelector('[data-idx="' + newIdx + '"]');
      if (curr) {
        curr.classList.add('active');
        if (document.getElementById('auto-scroll').checked) {
          curr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        if (currentSegIdx === -1) setCheck('chk-hl', true); // first highlight
      }
    }
    currentSegIdx = newIdx;
  }

  // Auto-page end detection
  if (pageData && t >= pageData.page_end_sec) {
    audio.pause();
    setStatus('Page end reached.', false);
  }
}

// ── Seek ──
function onSeekInput(val) {
  seekDragging = true;
}
function onSeekChange(val) {
  seekDragging = false;
  if (!pageData) return;
  const rangeStart = pageData.page_start_sec;
  const rangeEnd   = pageData.page_end_sec;
  const t = rangeStart + (val / 1000) * (rangeEnd - rangeStart);
  audio.currentTime = t;
  setCheck('chk-stream', true);
}

function seekToSegment(idx) {
  if (!pageData) return;
  const seg = pageData.segments[idx];
  audio.currentTime = seg.start;
  audio.play();
  setCheck('chk-click', true);
}

// ── Controls ──
function togglePlay() {
  if (audio.paused) {
    audio.play().catch(e => setStatus('Play error: ' + e.message, true));
  } else {
    audio.pause();
  }
}

function changeSpeed(val) {
  audio.playbackRate = parseFloat(val);
}

// ── Helpers ──
function fmtSec(s) {
  if (!isFinite(s)) return '?:??';
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function setStatus(msg, isError) {
  status.textContent = msg;
  status.className = isError ? 'error' : '';
}

function setCheck(id, ok) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = ok ? 'ok' : 'fail';
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { audio.currentTime += 5; }
  if (e.code === 'ArrowLeft')  { audio.currentTime -= 5; }
});

// ── Auto-load on startup ──
window.addEventListener('DOMContentLoaded', () => {
  // Auto-load default JSON so the page is immediately useful
  loadPage();
});
</script>
</body>
</html>
